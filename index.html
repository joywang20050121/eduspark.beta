<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教院小火花</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading 畫面 -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; color: #555; font-weight: bold;">小火花熱身中...</p>
</div>

<div id="app">
    <div id="toast">提示訊息</div>

    <div class="view-container">

        <!-- ===== 登入頁 ===== -->
        <div id="view-login" class="view">
            <div style="text-align: center; margin-top: 80px;">
                <img src="587780265_17853820758583520_8125964642604352843_n.jpg"
                     style="width: 120px; border-radius: 50%; margin-bottom: 20px; border: 4px solid white;">
                <h1 style="color: #444; letter-spacing: 2px; margin-bottom: 8px;">教院小火花</h1>
                <p style="color: #666; margin-bottom: 40px;">活化空間，點燃熱情</p>
                <button class="main-btn btn-start" onclick="window.loginWithGoogle()">使用 Google 帳號登入</button>
                <button class="main-btn btn-wish" onclick="window.loginAsGuest()" style="margin-top: 15px;">訪客遊玩</button>
            </div>
        </div>

        <!-- ===== 建立檔案頁 ===== -->
        <div id="view-setup" class="view">
            <h2 style="margin-bottom: 20px; color: var(--color-red);">建立火花檔案</h2>
            <div class="form-group">
                <label>真實姓名（僅供團隊核對，不公開）</label>
                <input type="text" id="setup-realname" placeholder="例：王小花">
            </div>
            <div class="form-group">
                <label>公開暱稱（會顯示在排行榜）</label>
                <input type="text" id="setup-nickname" placeholder="例：花花">
            </div>
            <div class="form-group">
                <label>系級（選填）</label>
                <input type="text" id="setup-dept" placeholder="例：教院27">
            </div>
            <div class="form-group">
                <label>自我介紹（選填，50字內）</label>
                <textarea id="setup-bio" maxlength="50" rows="3"></textarea>
            </div>
            <button class="main-btn btn-start" onclick="window.completeSetup()">開啟我的火花之旅</button>
        </div>

        <!-- ===== 首頁 ===== -->
        <div id="view-home" class="view">
            <div class="home-header">
                <div class="home-title">
                    <h1>教院小火花</h1>
                    <p>一起活化教育學院！</p>
                </div>
                <img id="home-avatar" src="587780265_17853820758583520_8125964642604352843_n.jpg"
                     alt="Logo" class="home-logo"
                     onclick="window.switchView('view-profile')">
            </div>

            <div class="score-display">
                <h2>我的積分</h2>
                <div class="spark-bg">
                    <span class="huge-score global-points">0</span>
                </div>
                <div class="score-actions-group">
                    <button class="reset-score-btn" onclick="window.hardResetScore()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        重置積分
                    </button>
                    <button class="reward-home-btn" onclick="window.switchView('view-reward')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="14" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="22"/><path d="M12 8V4a2 2 0 0 0-2-2h-1a2 2 0 0 0-2 2v4"/><path d="M12 8V4a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v4"/></svg>
                        兌換獎勵
                    </button>
                </div>
            </div>

            <div class="main-btn-group">
                <button class="main-btn btn-start" onclick="window.switchView('view-challenge')">開始探索</button>
                <button class="main-btn btn-wish"  onclick="window.showComingSoon()">許願池</button>
                <button class="main-btn btn-about" onclick="window.showComingSoon()">關於我們</button>
            </div>
        </div>

        <!-- ===== 社群排行榜 ===== -->
        <div id="view-social" class="view">
            <h2 class="section-title">社群排行榜</h2>
            <p class="section-desc">看看誰的火花最旺！</p>
            <div id="leaderboard-list"></div>
        </div>

        <!-- 詳細資訊 Modal -->
        <div id="leaderboard-detail-overlay" onclick="window.closeSocialDetail()"></div>
        <div class="leaderboard-detail" id="leaderboard-detail" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="window.closeSocialDetail()">×</button>
            <div id="detail-content"></div>
        </div>

        <!-- ===== 個人資料編輯 ===== -->
        <div id="view-profile" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-home')">◀ 返回</button>
                <h2 style="font-size: 18px;">編輯個人資料</h2>
            </div>
            <div class="form-group">
                <label>個人頭像</label>
                <div style="display:flex; align-items:center; gap:12px;">
                    <img id="edit-avatar-preview" src="587780265_17853820758583520_8125964642604352843_n.jpg" alt="我的頭像" style="width:72px; height:72px; border-radius:50%; object-fit:cover; border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                    <button class="reset-score-btn" onclick="window.resetAvatar()">重置頭像</button>
                </div>
            </div>
            <div class="form-group">
                <label>新增相簿中的圖案</label>
                <div id="avatar-album" style="display:flex; gap:12px; flex-wrap:wrap;"></div>
            </div>
            <div class="form-group">
                <label>真實姓名（不公開）</label>
                <input type="text" id="edit-realname">
            </div>
            <div class="form-group">
                <label>公開暱稱</label>
                <input type="text" id="edit-nickname">
            </div>
            <div class="form-group">
                <label>系級</label>
                <input type="text" id="edit-dept">
            </div>
            <div class="form-group">
                <label>自我介紹</label>
                <textarea id="edit-bio" maxlength="50" rows="3"></textarea>
            </div>
            <button class="main-btn btn-start" onclick="window.updateProfile()">儲存修改</button>
            <button onclick="window.logout()"
                    style="width:100%; background:none; border:1px solid #888; padding:10px; border-radius:20px; color:#666; font-weight:bold; margin-top:10px; cursor:pointer;">
                登出帳號
            </button>
        </div>

        <!-- ===== 闖關選擇 ===== -->
        <div id="view-challenge" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-home')">◀ 返回主頁</button>
                <div class="top-status">
                    <div class="top-spark-points"><span class="global-points">0</span></div>
                </div>
            </div>
            <h2 class="section-title">選擇關卡類別</h2>
            <p class="section-desc">參加活動或展覽以累積你的積分！</p>

            <button class="category-btn cat-exhibition" onclick="window.switchView('view-exhibition')">
                互動展覽
                <span class="sub-text">在教院的神秘角落，等你來發現</span>
            </button>
            <button class="category-btn cat-activity" onclick="window.switchView('view-activity')">
                實體活動
                <span class="sub-text">交流會、故事咖啡館與增能講座</span>
            </button>
        </div>

        <!-- ===== 互動展覽 ===== -->
        <div id="view-exhibition" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-challenge')">◀ 返回</button>
                <div class="top-status">
                    <button class="reset-btn" onclick="window.resetTasks()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        重置關卡
                    </button>
                    <div class="top-spark-points"><span class="global-points">0</span></div>
                </div>
            </div>
            <h2 class="section-title">互動展覽</h2>
            <div class="section-desc">與展覽互動，每天都可以累積點點！</div>

            <button class="task-btn task-exhibition" onclick="window.earnPoints(this, 1, '寫下你的心情小語')">寫下你的心情小語 (+1點)</button>
            <button class="task-btn task-exhibition" onclick="window.earnPoints(this, 1, '創作你心中的教育學院大樓')">創作你心中的教育學院大樓 (+1點)</button>
            <button class="task-btn task-exhibition" onclick="window.earnPoints(this, 1, '情書交換箱')">情書交換箱 (+1點)</button>
            <button class="task-btn task-exhibition" onclick="window.earnPoints(this, 1, '物件交換區')">物件交換區 (+1點)</button>
        </div>

        <!-- ===== 實體活動 ===== -->
        <div id="view-activity" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-challenge')">◀ 返回</button>
                <div class="top-status">
                    <button class="reset-btn" onclick="window.resetTasks()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        重置關卡
                    </button>
                    <div class="top-spark-points"><span class="global-points">0</span></div>
                </div>
            </div>
            <h2 class="section-title">實體活動</h2>
            <p class="section-desc">參加交流與專業增能活動獲取點數！</p>

            <div class="split-btn-group">
                <button class="task-btn task-activity split-btn" onclick="window.earnPoints(this, 2, '午餐交流會')">
                    午餐交流會<br><span style="font-size:12px; font-weight:normal;">(+2點)</span>
                </button>
                <button class="task-btn task-activity split-btn" onclick="window.earnPoints(this, 3, '午間英語角')">
                    午間英語角<br><span style="font-size:12px; font-weight:normal;">(+3點)</span>
                </button>
            </div>
            <button class="task-btn task-activity" onclick="window.earnPoints(this, 2, '故事咖啡館')">故事咖啡館 (+2點)</button>
            <button class="task-btn task-activity" onclick="window.earnPoints(this, 1, '經驗分享講座')">經驗分享講座 (+1點)</button>
            <button class="task-btn task-activity" onclick="window.earnPoints(this, 3, '專業知能講座/工作坊')">專業知能講座 / 工作坊 (+3點)</button>
        </div>

        <!-- ===== 兌換獎勵 ===== -->
        <div id="view-reward" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-home')">◀ 返回主頁</button>
                <div class="top-status">
                    <button class="reset-btn" onclick="window.switchView('view-history')">歷史紀錄</button>
                    <div class="top-spark-points"><span class="global-points">0</span></div>
                </div>
            </div>
            <h2 class="section-title">兌換獎勵</h2>
            <p class="section-desc">辛苦累積的積分，來換點實質的回饋吧！點擊即可兌換（可重複兌換）</p>

            <button class="reward-btn" onclick="window.redeemReward(10, '星巴克一杯')">星巴克一杯 (-10點)</button>
            <button class="reward-btn" onclick="window.redeemReward(20, '7-11 100元禮品券')">7-11 100元禮品券 (-20點)</button>
            <button class="reward-btn" onclick="window.redeemReward(30, '0.2微學分')">0.2微學分 (-30點)</button>
        </div>

        <!-- ===== 歷史紀錄 ===== -->
        <div id="view-history" class="view">
            <div class="nav-bar">
                <button class="back-btn" onclick="window.switchView('view-reward')">◀ 返回兌換獎勵</button>
                <div class="top-status">
                    <button class="reset-btn" onclick="window.clearHistory()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        清空歷史紀錄
                    </button>
                </div>
            </div>
            <h2 class="section-title">歷史紀錄</h2>
            <p class="section-desc">這是您過去所有的獎勵兌換明細：</p>
            <div id="history-container">
                <p class="empty-history">尚無兌換紀錄，快去闖關累積點數吧！</p>
            </div>
        </div>

    </div><!-- /view-container -->

    <!-- ===== 底部導覽列 ===== -->
    <nav class="bottom-nav" id="main-nav">
        <div class="nav-item active" onclick="window.navTo('view-home', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>首頁</span>
        </div>
        <div class="nav-item" onclick="window.navTo('view-social', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>社群</span>
        </div>
    </nav>
</div>

<!-- Firebase 與應用邏輯 -->
<script type="module" src="script.js"></script>

</body>
</html>
